<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyAI Assist - AI Search Assistant</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'system-ui', '-apple-system', 'sans-serif']
                    },
                    colors: {
                        dark: {
                            bg: '#09090b',
                            surface: '#18181b',
                            elevated: '#27272a',
                            input: '#1f1f23',
                            hover: '#3f3f46',
                            border: 'rgba(255,255,255,0.08)',
                            text: '#fafafa',
                            muted: '#a1a1aa'
                        },
                        accent: {
                            primary: '#8b5cf6',
                            secondary: '#6366f1',
                            glow: 'rgba(139, 92, 246, 0.15)'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        * {
            scrollbar-width: thin;
            scrollbar-color: rgba(255,255,255,0.1) transparent;
        }
        *::-webkit-scrollbar {
            width: 6px;
        }
        *::-webkit-scrollbar-track {
            background: transparent;
        }
        *::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.1);
            border-radius: 3px;
        }
        *::-webkit-scrollbar-thumb:hover {
            background: rgba(255,255,255,0.2);
        }

        body {
            background: #09090b;
            color: #fafafa;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* Ambient background glow */
        .ambient-glow {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            overflow: hidden;
            z-index: 0;
        }

        .glow-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.4;
            animation: float 20s infinite ease-in-out;
        }

        .glow-orb-1 {
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(139, 92, 246, 0.3) 0%, transparent 70%);
            top: -200px;
            left: -200px;
            animation-delay: 0s;
        }

        .glow-orb-2 {
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.25) 0%, transparent 70%);
            bottom: -150px;
            right: -100px;
            animation-delay: -10s;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, -30px) scale(1.05); }
            66% { transform: translate(-20px, 20px) scale(0.95); }
        }

        /* Glass morphism */
        .glass {
            background: rgba(24, 24, 27, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.06);
        }

        .glass-subtle {
            background: rgba(24, 24, 27, 0.5);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        .message-container {
            max-height: calc(100vh - 200px);
            overflow-y: auto;
            scroll-behavior: smooth;
        }

        /* Message Styles */
        .user-msg {
            background: linear-gradient(135deg, rgba(139, 92, 246, 0.15) 0%, rgba(99, 102, 241, 0.1) 100%);
            border: 1px solid rgba(139, 92, 246, 0.2);
            color: #fafafa;
            padding: 18px 22px;
            border-radius: 20px 20px 6px 20px;
            margin: 16px 0;
            max-width: 75%;
            margin-left: auto;
            position: relative;
            box-shadow: 0 4px 24px rgba(139, 92, 246, 0.1);
        }

        .assistant-msg {
            background: rgba(39, 39, 42, 0.6);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            color: #fafafa;
            padding: 20px 24px;
            border-radius: 20px 20px 20px 6px;
            margin: 16px 0;
            max-width: 85%;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.2);
        }

        .loading-msg {
            background: rgba(39, 39, 42, 0.4);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.04);
            color: #a1a1aa;
            padding: 18px 22px;
            border-radius: 20px 20px 20px 6px;
            margin: 16px 0;
            max-width: 85%;
        }

        /* Typing indicator */
        .typing-indicator {
            display: flex;
            gap: 6px;
            align-items: center;
            padding: 4px 0;
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: linear-gradient(135deg, #8b5cf6 0%, #6366f1 100%);
            animation: typing 1.4s infinite ease-in-out;
        }

        .typing-dot:nth-child(1) { animation-delay: 0s; }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typing {
            0%, 60%, 100% {
                transform: translateY(0);
                opacity: 0.4;
            }
            30% {
                transform: translateY(-10px);
                opacity: 1;
            }
        }

        /* Fade in animation */
        .fade-in {
            animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Status badge */
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 6px 14px;
            border-radius: 100px;
            font-size: 12px;
            font-weight: 500;
            letter-spacing: 0.02em;
            transition: all 0.3s ease;
        }

        .status-ok {
            background: rgba(34, 197, 94, 0.1);
            color: #22c55e;
            border: 1px solid rgba(34, 197, 94, 0.2);
        }

        .status-ok::before {
            content: '';
            width: 7px;
            height: 7px;
            background: #22c55e;
            border-radius: 50%;
            box-shadow: 0 0 12px rgba(34, 197, 94, 0.6);
            animation: pulse-glow 2s infinite;
        }

        .status-error {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        @keyframes pulse-glow {
            0%, 100% { opacity: 1; box-shadow: 0 0 12px rgba(34, 197, 94, 0.6); }
            50% { opacity: 0.6; box-shadow: 0 0 4px rgba(34, 197, 94, 0.3); }
        }

        /* Individual API status badges */
        .api-status-container {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .api-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 10px;
            border-radius: 100px;
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.02em;
            transition: all 0.3s ease;
        }

        .api-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            transition: all 0.3s ease;
        }

        .api-name {
            color: inherit;
        }

        /* Online state */
        .api-online {
            background: rgba(34, 197, 94, 0.1);
            color: #22c55e;
            border: 1px solid rgba(34, 197, 94, 0.2);
        }

        .api-online .api-dot {
            background: #22c55e;
            box-shadow: 0 0 8px rgba(34, 197, 94, 0.6);
            animation: pulse-glow 2s infinite;
        }

        /* Offline state */
        .api-offline {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        .api-offline .api-dot {
            background: #ef4444;
        }

        /* Checking state */
        .api-checking {
            background: rgba(161, 161, 170, 0.1);
            color: #a1a1aa;
            border: 1px solid rgba(161, 161, 170, 0.2);
        }

        .api-checking .api-dot {
            background: #a1a1aa;
            animation: checking-pulse 1s infinite;
        }

        @keyframes checking-pulse {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; }
        }

        /* Responsive - hide names on small screens */
        @media (max-width: 480px) {
            .api-name {
                display: none;
            }
            .api-badge {
                padding: 4px 8px;
            }
        }

        /* Code block styling */
        .code-block-wrapper {
            position: relative;
            margin: 16px 0;
            border-radius: 12px;
            overflow: hidden;
            background: #0d0d0f;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .code-block-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 16px;
            background: rgba(255, 255, 255, 0.03);
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        }

        .code-language {
            font-size: 12px;
            font-weight: 500;
            color: #a78bfa;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .copy-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            font-size: 12px;
            font-weight: 500;
            color: #a1a1aa;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .copy-btn:hover {
            background: rgba(139, 92, 246, 0.15);
            border-color: rgba(139, 92, 246, 0.3);
            color: #a78bfa;
        }

        .copy-btn.copied {
            background: rgba(34, 197, 94, 0.15);
            border-color: rgba(34, 197, 94, 0.3);
            color: #22c55e;
        }

        .code-block-content {
            padding: 16px;
            overflow-x: auto;
            font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
            font-size: 13px;
            line-height: 1.6;
            color: #e4e4e7;
            tab-size: 4;
        }

        .code-block-content code {
            background: transparent;
            padding: 0;
            border: none;
            font-size: inherit;
        }

        /* Syntax highlighting colors */
        .code-block-content .keyword { color: #c678dd; }
        .code-block-content .string { color: #98c379; }
        .code-block-content .number { color: #d19a66; }
        .code-block-content .comment { color: #5c6370; font-style: italic; }
        .code-block-content .function { color: #61afef; }
        .code-block-content .class-name { color: #e5c07b; }
        .code-block-content .operator { color: #56b6c2; }
        .code-block-content .punctuation { color: #abb2bf; }

        /* Inline code */
        .inline-code {
            background: rgba(139, 92, 246, 0.15);
            color: #c4b5fd;
            padding: 2px 8px;
            border-radius: 6px;
            font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
            font-size: 0.9em;
            border: 1px solid rgba(139, 92, 246, 0.2);
        }

        /* Input area */
        .input-wrapper {
            position: relative;
            background: rgba(24, 24, 27, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255, 255, 255, 0.06);
        }

        .chat-input {
            background: rgba(31, 31, 35, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: #fafafa;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            font-size: 15px;
            line-height: 1.5;
        }

        .chat-input:focus {
            border-color: rgba(139, 92, 246, 0.5);
            box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.1), 0 0 30px rgba(139, 92, 246, 0.1);
            outline: none;
            background: rgba(31, 31, 35, 1);
        }

        .chat-input::placeholder {
            color: #52525b;
        }

        /* Send button */
        .send-btn {
            background: linear-gradient(135deg, #8b5cf6 0%, #6366f1 100%);
            position: relative;
            overflow: hidden;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 4px 20px rgba(139, 92, 246, 0.3);
        }

        .send-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, #a78bfa 0%, #818cf8 100%);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .send-btn:hover:not(:disabled)::before {
            opacity: 1;
        }

        .send-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(139, 92, 246, 0.4);
        }

        .send-btn:active:not(:disabled) {
            transform: translateY(0);
        }

        .send-btn:disabled {
            background: #27272a;
            box-shadow: none;
            cursor: not-allowed;
        }

        .send-btn svg,
        .send-btn span {
            position: relative;
            z-index: 1;
        }

        /* Code styling */
        .assistant-msg code {
            background: rgba(0, 0, 0, 0.4);
            padding: 3px 10px;
            border-radius: 8px;
            font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
            font-size: 0.88em;
            border: 1px solid rgba(255, 255, 255, 0.06);
        }

        .assistant-msg pre {
            background: rgba(0, 0, 0, 0.5);
            padding: 18px;
            border-radius: 14px;
            overflow-x: auto;
            margin: 14px 0;
            border: 1px solid rgba(255, 255, 255, 0.06);
            font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
        }

        /* Header */
        .header-glass {
            background: rgba(9, 9, 11, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        }

        .logo-text {
            background: linear-gradient(135deg, #c4b5fd 0%, #a78bfa 50%, #8b5cf6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        .logo-icon {
            background: linear-gradient(135deg, #8b5cf6 0%, #6366f1 100%);
            box-shadow: 0 4px 20px rgba(139, 92, 246, 0.3);
        }

        /* Keyboard shortcuts */
        kbd {
            background: rgba(39, 39, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            padding: 3px 8px;
            font-size: 11px;
            font-family: 'SF Mono', 'Fira Code', monospace;
            color: #a1a1aa;
        }

        /* Clear button */
        .clear-btn {
            color: #52525b;
            transition: all 0.2s ease;
            padding: 4px 8px;
            border-radius: 6px;
        }

        .clear-btn:hover {
            color: #ef4444;
            background: rgba(239, 68, 68, 0.1);
        }

        /* Suggestion cards */
        .suggestion-card {
            background: rgba(39, 39, 42, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.06);
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            overflow: hidden;
        }

        .suggestion-card::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(139, 92, 246, 0.1) 0%, rgba(99, 102, 241, 0.05) 100%);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .suggestion-card:hover {
            border-color: rgba(139, 92, 246, 0.3);
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.3);
        }

        .suggestion-card:hover::before {
            opacity: 1;
        }

        .suggestion-card > * {
            position: relative;
            z-index: 1;
        }

        /* Category pill */
        .category-pill {
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            padding: 4px 10px;
            border-radius: 100px;
            background: rgba(139, 92, 246, 0.15);
            color: #a78bfa;
            border: 1px solid rgba(139, 92, 246, 0.2);
        }

        /* Welcome section */
        .welcome-icon {
            background: linear-gradient(135deg, #8b5cf6 0%, #6366f1 100%);
            box-shadow: 0 8px 40px rgba(139, 92, 246, 0.3);
        }

        /* Message header */
        .msg-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
        }

        .msg-avatar {
            width: 28px;
            height: 28px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .msg-avatar-user {
            background: linear-gradient(135deg, rgba(139, 92, 246, 0.3) 0%, rgba(99, 102, 241, 0.2) 100%);
            border: 1px solid rgba(139, 92, 246, 0.3);
        }

        .msg-avatar-ai {
            background: linear-gradient(135deg, #8b5cf6 0%, #6366f1 100%);
        }

        .msg-name {
            font-size: 13px;
            font-weight: 600;
            color: #a1a1aa;
            letter-spacing: 0.01em;
        }

        /* Refresh button */
        .refresh-btn {
            transition: all 0.2s ease;
            padding: 8px 16px;
            border-radius: 100px;
            border: 1px solid rgba(255, 255, 255, 0.06);
        }

        .refresh-btn:hover {
            background: rgba(139, 92, 246, 0.1);
            border-color: rgba(139, 92, 246, 0.3);
            color: #a78bfa;
        }

        .refresh-btn:hover svg {
            animation: spin 1s linear;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* Responsive */
        @media (max-width: 640px) {
            .user-msg, .assistant-msg {
                max-width: 92%;
            }

            .glow-orb {
                opacity: 0.2;
            }
        }
    </style>
</head>
<body class="dark">
    <!-- Ambient background -->
    <div class="ambient-glow">
        <div class="glow-orb glow-orb-1"></div>
        <div class="glow-orb glow-orb-2"></div>
    </div>

    <div class="flex flex-col h-screen relative z-10">
        <!-- Header -->
        <header class="header-glass sticky top-0 z-50 py-4 px-6">
            <div class="max-w-4xl mx-auto">
                <div class="flex items-center justify-between">
                    <div class="flex items-center gap-4">
                        <div class="logo-icon w-11 h-11 rounded-2xl flex items-center justify-center">
                            <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path>
                            </svg>
                        </div>
                        <div>
                            <h1 class="text-xl logo-text">MyAI Assist</h1>
                            <p class="text-xs text-zinc-500 mt-0.5">Gemini + Typhoon AI</p>
                        </div>
                    </div>
                    <div id="status-info" class="flex items-center gap-2">
                        <div class="api-status-container flex items-center gap-1.5">
                            <span id="gemini-status" class="api-badge api-checking" title="Gemini API">
                                <span class="api-dot"></span>
                                <span class="api-name">Gemini</span>
                            </span>
                            <span id="typhoon-status" class="api-badge api-checking" title="Typhoon API">
                                <span class="api-dot"></span>
                                <span class="api-name">Typhoon</span>
                            </span>
                            <span id="groq-status" class="api-badge api-checking" title="GROQ API">
                                <span class="api-dot"></span>
                                <span class="api-name">GROQ</span>
                            </span>
                        </div>
                    </div>
                </div>
            </div>
        </header>

        <!-- Chat Messages -->
        <main class="flex-1 overflow-y-auto px-4 py-6">
            <div class="max-w-4xl mx-auto message-container" id="chat">
                <div class="text-center py-12" id="welcome-message">
                    <div class="welcome-icon w-24 h-24 mx-auto mb-8 rounded-3xl flex items-center justify-center">
                        <svg class="w-12 h-12 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"></path>
                        </svg>
                    </div>

                    <h2 class="text-3xl font-semibold text-white mb-3 tracking-tight">Welcome to MyAI Assist</h2>
                    <p class="text-zinc-400 mb-10 text-lg">Ask me anything. I'll search and provide accurate answers.</p>

                    <p class="text-sm text-zinc-500 mb-6">
                        <span class="category-pill">Today's Topics</span>
                    </p>

                    <div id="suggestions-container" class="grid grid-cols-1 md:grid-cols-2 gap-4 max-w-2xl mx-auto text-left">
                        <div class="col-span-full text-center py-8">
                            <div class="typing-indicator justify-center">
                                <div class="typing-dot"></div>
                                <div class="typing-dot"></div>
                                <div class="typing-dot"></div>
                            </div>
                            <p class="text-zinc-500 text-sm mt-3">Loading suggestions...</p>
                        </div>
                    </div>

                    <button onclick="loadSuggestions()" id="refresh-btn" class="refresh-btn mt-8 text-sm text-zinc-500 flex items-center gap-2 mx-auto">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path>
                        </svg>
                        Refresh suggestions
                    </button>
                </div>
            </div>
        </main>

        <!-- Input Area -->
        <footer class="input-wrapper p-4 sm:p-6">
            <div class="max-w-4xl mx-auto">
                <div class="flex gap-3">
                    <textarea
                        id="message-input"
                        placeholder="Ask me anything..."
                        class="chat-input flex-1 rounded-2xl px-5 py-4 resize-none"
                        rows="1"
                    ></textarea>
                    <button
                        id="send-btn"
                        onclick="sendMessage()"
                        class="send-btn text-white rounded-2xl px-6 py-4 flex items-center gap-2 font-medium"
                    >
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path>
                        </svg>
                        <span id="send-btn-text" class="hidden sm:inline">Send</span>
                    </button>
                </div>
                <div class="mt-3 flex justify-between items-center text-xs text-zinc-500">
                    <div class="flex items-center gap-2">
                        <kbd>Enter</kbd>
                        <span>to send</span>
                        <span class="text-zinc-600 mx-1">•</span>
                        <kbd>Shift</kbd>+<kbd>Enter</kbd>
                        <span>for new line</span>
                    </div>
                    <button onclick="clearChat()" class="clear-btn flex items-center gap-1.5">
                        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path>
                        </svg>
                        Clear chat
                    </button>
                </div>
            </div>
        </footer>
    </div>

    <script>
        const API_ENDPOINT = '/api/chat';
        const HEALTH_ENDPOINT = '/health';
        const SUGGESTIONS_ENDPOINT = '/api/suggestions';
        const MAX_HISTORY = 5; // จำบทสนทนา 5 ครั้งล่าสุด

        // Conversation history storage
        let conversationHistory = [];

        const defaultSuggestions = [
            {"question": "What are the latest breakthroughs in AI?", "description": "Recent AI developments", "category": "Technology"},
            {"question": "อธิบายเรื่อง Quantum Computing แบบง่ายๆ", "description": "เรียนรู้เทคโนโลยีใหม่", "category": "Science"},
            {"question": "What's trending in the world today?", "description": "Current global events", "category": "News"},
            {"question": "สอนทำอาหารไทยง่ายๆ สักจาน", "description": "สูตรอาหารไทย", "category": "Culture"}
        ];

        function renderSuggestions(suggestions) {
            const container = document.getElementById('suggestions-container');
            if (!container) return;

            container.innerHTML = suggestions.map(s => `
                <div class="suggestion-card p-5 rounded-2xl cursor-pointer" onclick="askSuggestion('${escapeHtml(s.question).replace(/'/g, "\\'")}')">
                    <span class="category-pill mb-3 inline-block">${escapeHtml(s.category || 'Topic')}</span>
                    <p class="text-sm text-white font-medium mb-2">${escapeHtml(s.question)}</p>
                    <p class="text-xs text-zinc-500">${escapeHtml(s.description)}</p>
                </div>
            `).join('');
        }

        async function loadSuggestions() {
            const container = document.getElementById('suggestions-container');
            const refreshBtn = document.getElementById('refresh-btn');

            if (container) {
                container.innerHTML = `
                    <div class="col-span-full text-center py-8">
                        <div class="typing-indicator justify-center">
                            <div class="typing-dot"></div>
                            <div class="typing-dot"></div>
                            <div class="typing-dot"></div>
                        </div>
                        <p class="text-zinc-500 text-sm mt-3">Loading suggestions...</p>
                    </div>
                `;
            }

            if (refreshBtn) {
                refreshBtn.disabled = true;
                refreshBtn.style.opacity = '0.5';
            }

            try {
                const response = await fetch(SUGGESTIONS_ENDPOINT);
                const data = await response.json();

                if (data.suggestions && data.suggestions.length > 0) {
                    renderSuggestions(data.suggestions);
                } else {
                    renderSuggestions(defaultSuggestions);
                }
            } catch (error) {
                console.error('Failed to load suggestions:', error);
                renderSuggestions(defaultSuggestions);
            } finally {
                if (refreshBtn) {
                    refreshBtn.disabled = false;
                    refreshBtn.style.opacity = '1';
                }
            }
        }

        function updateApiStatus(elementId, isOnline) {
            const badge = document.getElementById(elementId);
            if (!badge) return;

            badge.className = `api-badge ${isOnline ? 'api-online' : 'api-offline'}`;
        }

        async function checkHealth() {
            try {
                const response = await fetch(HEALTH_ENDPOINT);
                const data = await response.json();

                // Update individual API statuses
                if (data.apis) {
                    updateApiStatus('gemini-status', data.apis.gemini.configured);
                    updateApiStatus('typhoon-status', data.apis.typhoon.configured);
                    updateApiStatus('groq-status', data.apis.groq.configured);
                } else {
                    // Fallback for older API response format
                    updateApiStatus('gemini-status', data.gemini_configured);
                    updateApiStatus('typhoon-status', data.typhoon_configured);
                    updateApiStatus('groq-status', data.groq_configured);
                }
            } catch (error) {
                console.error('Health check failed:', error);
                // Set all to offline on error
                updateApiStatus('gemini-status', false);
                updateApiStatus('typhoon-status', false);
                updateApiStatus('groq-status', false);
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Simple syntax highlighting
        function highlightCode(code, language) {
            let highlighted = escapeHtml(code);

            // Keywords for common languages
            const keywords = {
                'python': /\b(def|class|import|from|return|if|elif|else|for|while|try|except|finally|with|as|lambda|yield|raise|pass|break|continue|and|or|not|in|is|None|True|False|async|await)\b/g,
                'javascript': /\b(function|const|let|var|return|if|else|for|while|try|catch|finally|class|import|export|from|default|async|await|new|this|super|extends|static|get|set|typeof|instanceof|null|undefined|true|false)\b/g,
                'typescript': /\b(function|const|let|var|return|if|else|for|while|try|catch|finally|class|import|export|from|default|async|await|new|this|super|extends|static|get|set|typeof|instanceof|null|undefined|true|false|interface|type|enum|implements|private|public|protected|readonly)\b/g,
                'java': /\b(public|private|protected|class|interface|extends|implements|return|if|else|for|while|try|catch|finally|new|this|super|static|final|void|int|long|double|float|boolean|char|String|null|true|false|import|package)\b/g,
                'html': /(&lt;\/?)([\w-]+)/g,
                'css': /\b(color|background|margin|padding|border|font|display|position|width|height|top|left|right|bottom|flex|grid)\b/g,
                'sql': /\b(SELECT|FROM|WHERE|INSERT|UPDATE|DELETE|CREATE|DROP|ALTER|TABLE|INDEX|JOIN|LEFT|RIGHT|INNER|OUTER|ON|AND|OR|NOT|NULL|AS|ORDER|BY|GROUP|HAVING|LIMIT|OFFSET)\b/gi,
                'bash': /\b(echo|cd|ls|mkdir|rm|cp|mv|cat|grep|awk|sed|chmod|chown|sudo|apt|yum|npm|pip|git|docker)\b/g,
                'go': /\b(func|package|import|return|if|else|for|range|switch|case|default|var|const|type|struct|interface|map|chan|go|defer|select|nil|true|false)\b/g,
                'rust': /\b(fn|let|mut|const|if|else|for|while|loop|match|return|pub|mod|use|struct|enum|impl|trait|where|self|Self|true|false|None|Some|Ok|Err)\b/g
            };

            const lang = language?.toLowerCase() || '';

            // Apply keyword highlighting
            if (keywords[lang]) {
                highlighted = highlighted.replace(keywords[lang], '<span class="keyword">$&</span>');
            }

            // Strings (double and single quotes)
            highlighted = highlighted.replace(/(&quot;[^&]*&quot;|&#39;[^&]*&#39;)/g, '<span class="string">$&</span>');

            // Comments (// and #)
            highlighted = highlighted.replace(/(\/\/.*|#.*)/g, '<span class="comment">$&</span>');

            // Numbers
            highlighted = highlighted.replace(/\b(\d+\.?\d*)\b/g, '<span class="number">$1</span>');

            // Function calls
            highlighted = highlighted.replace(/\b([a-zA-Z_]\w*)\s*\(/g, '<span class="function">$1</span>(');

            return highlighted;
        }

        // Copy code to clipboard
        function copyCode(btn, codeId) {
            const codeElement = document.getElementById(codeId);
            if (!codeElement) return;

            const code = codeElement.textContent;
            navigator.clipboard.writeText(code).then(() => {
                btn.classList.add('copied');
                btn.innerHTML = '<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg><span>Copied!</span>';

                setTimeout(() => {
                    btn.classList.remove('copied');
                    btn.innerHTML = '<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg><span>Copy</span>';
                }, 2000);
            });
        }

        let codeBlockCounter = 0;

        function formatMessage(text) {
            // First, extract and process code blocks
            const codeBlocks = [];
            let processedText = text.replace(/```(\w*)\n?([\s\S]*?)```/g, (match, lang, code) => {
                const blockId = `code-block-${codeBlockCounter++}`;
                const language = lang || 'code';
                const trimmedCode = code.trim();

                codeBlocks.push({
                    id: blockId,
                    language: language,
                    code: trimmedCode,
                    highlighted: highlightCode(trimmedCode, language)
                });

                return `__CODE_BLOCK_${codeBlocks.length - 1}__`;
            });

            // Escape HTML for regular text
            let formatted = escapeHtml(processedText);

            // Apply markdown formatting
            formatted = formatted.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
            formatted = formatted.replace(/\*([^*]+)\*/g, '<em>$1</em>');

            // Inline code (backticks) - use special class
            formatted = formatted.replace(/`([^`]+)`/g, '<code class="inline-code">$1</code>');

            // Line breaks
            formatted = formatted.replace(/\n/g, '<br>');

            // Replace code block placeholders with actual HTML
            codeBlocks.forEach((block, index) => {
                const codeBlockHtml = `
                    <div class="code-block-wrapper">
                        <div class="code-block-header">
                            <span class="code-language">${escapeHtml(block.language)}</span>
                            <button class="copy-btn" onclick="copyCode(this, '${block.id}')">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path>
                                </svg>
                                <span>Copy</span>
                            </button>
                        </div>
                        <div class="code-block-content">
                            <code id="${block.id}">${block.highlighted}</code>
                        </div>
                    </div>`;
                formatted = formatted.replace(`__CODE_BLOCK_${index}__`, codeBlockHtml);
            });

            return formatted;
        }

        function addMessage(content, type, metadata = {}) {
            const chatDiv = document.getElementById('chat');
            const welcomeMsg = document.getElementById('welcome-message');

            if (welcomeMsg) {
                welcomeMsg.remove();
            }

            const msgDiv = document.createElement('div');
            msgDiv.className = 'fade-in';

            let className = 'user-msg';
            let avatarClass = 'msg-avatar-user';
            let icon = '<svg class="w-4 h-4 text-violet-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>';
            let title = 'You';

            if (type === 'assistant') {
                className = 'assistant-msg';
                avatarClass = 'msg-avatar-ai';
                icon = '<svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>';
                title = 'MyAI Assist';
            } else if (type === 'loading') {
                className = 'loading-msg';
                avatarClass = 'msg-avatar-ai';
                icon = '<svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>';
                title = 'Thinking';
            } else if (type === 'error') {
                className = 'assistant-msg';
                avatarClass = 'msg-avatar-ai';
                icon = '<svg class="w-4 h-4 text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>';
                title = 'Error';
            }

            let html = `<div class="${className}">
                <div class="msg-header">
                    <div class="msg-avatar ${avatarClass}">${icon}</div>
                    <span class="msg-name">${title}</span>
                </div>`;

            if (type === 'loading') {
                html += `<div class="flex items-center gap-4">
                    <span class="text-zinc-400">${escapeHtml(content)}</span>
                    <div class="typing-indicator">
                        <div class="typing-dot"></div>
                        <div class="typing-dot"></div>
                        <div class="typing-dot"></div>
                    </div>
                </div>`;
            } else {
                html += `<div style="line-height: 1.7; color: rgba(250,250,250,0.9);">${formatMessage(content)}</div>`;
            }

            if (type === 'assistant' && metadata.is_fallback) {
                html += `<div class="mt-4 pt-4 border-t border-white/5 text-xs text-zinc-500 flex items-center gap-2">
                    <svg class="w-4 h-4 text-amber-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path>
                    </svg>
                    Fallback response - API temporarily unavailable
                </div>`;
            }

            html += '</div>';
            msgDiv.innerHTML = html;

            if (type === 'loading') {
                msgDiv.id = 'loading-msg-' + Date.now();
            }

            chatDiv.appendChild(msgDiv);
            chatDiv.scrollTop = chatDiv.scrollHeight;

            return msgDiv.id;
        }

        function removeMessage(id) {
            if (id) {
                const msg = document.getElementById(id);
                if (msg) {
                    msg.style.opacity = '0';
                    msg.style.transform = 'translateY(-8px)';
                    msg.style.transition = 'all 0.2s ease';
                    setTimeout(() => msg.remove(), 200);
                }
            }
        }

        function askSuggestion(text) {
            document.getElementById('message-input').value = text;
            sendMessage();
        }

        async function sendMessage() {
            const input = document.getElementById('message-input');
            const message = input.value.trim();

            if (!message) return;

            const sendBtn = document.getElementById('send-btn');
            const sendBtnText = document.getElementById('send-btn-text');

            sendBtn.disabled = true;
            if (sendBtnText) sendBtnText.textContent = '...';

            addMessage(message, 'user');
            input.value = '';
            input.style.height = 'auto';

            const loadingId = addMessage('Searching and analyzing', 'loading');

            try {
                const response = await fetch(API_ENDPOINT, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: message,
                        history: conversationHistory
                    })
                });

                removeMessage(loadingId);

                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.error || `Server error: ${response.status}`);
                }

                const data = await response.json();

                if (data.reply) {
                    addMessage(data.reply, 'assistant', { is_fallback: data.is_fallback });

                    // Add to conversation history
                    conversationHistory.push(
                        { role: 'user', content: message },
                        { role: 'assistant', content: data.reply }
                    );

                    // Keep only last 5 conversations (10 messages: 5 user + 5 assistant)
                    if (conversationHistory.length > MAX_HISTORY * 2) {
                        conversationHistory = conversationHistory.slice(-MAX_HISTORY * 2);
                    }
                }

                if (data.status === 'error') {
                    throw new Error(data.error || 'Unknown error occurred');
                }

            } catch (error) {
                console.error('Error:', error);
                removeMessage(loadingId);
                addMessage(`Error: ${error.message}\n\nPlease try again or check if the server is running.`, 'error');
            } finally {
                sendBtn.disabled = false;
                if (sendBtnText) sendBtnText.textContent = 'Send';
                input.focus();
            }
        }

        function clearChat() {
            // Clear conversation history
            conversationHistory = [];

            const chatDiv = document.getElementById('chat');
            chatDiv.innerHTML = `
                <div class="text-center py-12" id="welcome-message">
                    <div class="welcome-icon w-24 h-24 mx-auto mb-8 rounded-3xl flex items-center justify-center">
                        <svg class="w-12 h-12 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"></path>
                        </svg>
                    </div>

                    <h2 class="text-3xl font-semibold text-white mb-3 tracking-tight">Welcome to MyAI Assist</h2>
                    <p class="text-zinc-400 mb-10 text-lg">Ask me anything. I'll search and provide accurate answers.</p>

                    <p class="text-sm text-zinc-500 mb-6">
                        <span class="category-pill">Today's Topics</span>
                    </p>

                    <div id="suggestions-container" class="grid grid-cols-1 md:grid-cols-2 gap-4 max-w-2xl mx-auto text-left">
                    </div>

                    <button onclick="loadSuggestions()" id="refresh-btn" class="refresh-btn mt-8 text-sm text-zinc-500 flex items-center gap-2 mx-auto">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path>
                        </svg>
                        Refresh suggestions
                    </button>
                </div>
            `;
            loadSuggestions();
        }

        document.getElementById('message-input').addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        document.getElementById('message-input').addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 150) + 'px';
        });

        window.addEventListener('load', () => {
            checkHealth();
            loadSuggestions();
            document.getElementById('message-input').focus();
        });

        setInterval(checkHealth, 30000);
    </script>
</body>
</html>
