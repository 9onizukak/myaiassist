<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MyAI Assist</title>
  <style>
    body { margin: 0; background: #09090b; display: flex; align-items: center; justify-content: center; height: 100vh; font-family: sans-serif; color: #fff; }
    .loader { text-align: center; }
    .dot { display: inline-block; width: 12px; height: 12px; background: #58cc02; border-radius: 50%; margin: 4px; animation: bounce 1.2s infinite ease-in-out; }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%,80%,100%{transform:scale(0)} 40%{transform:scale(1)} }
  </style>
</head>
<body>
  <div class="loader">
    <div class="dot"></div><div class="dot"></div><div class="dot"></div>
    <p style="margin-top:16px;color:#a1a1aa;font-size:14px;">Loading MyAI Assist...</p>
  </div>
</body>
</html>
